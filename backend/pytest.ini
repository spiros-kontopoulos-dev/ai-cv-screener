[pytest]
# Search for automated tests only inside the backend tests directory.
testpaths = tests

# Recognize files following the conventional test_*.py naming format.
python_files = test_*.py

# Add the backend project root (/app inside Docker) to Python's import path.
# This allows tests to import the application package as ``app`` regardless
# of whether Pytest is started through ``pytest`` or ``python -m pytest``.
pythonpath = .

# Produce concise output while still displaying failures clearly.
addopts = -q
