services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # Mount application source for Uvicorn reload during development.
      - ./backend/app:/app/app

      # Mount tests and Pytest configuration so newly edited tests are
      # immediately visible without rebuilding the backend image.
      - ./backend/tests:/app/tests
      - ./backend/pytest.ini:/app/pytest.ini:ro

      # Persist generated profiles and later CV assets on the host.
      - ./data:/app/data

      # Persist Hugging Face model downloads and the local ChromaDB index.
      # The application still receives explicit PDF embeddings rather than
      # delegating embedding generation to Chroma.
      - ./storage:/app/storage
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  frontend:
    # Build the React/Vite image from frontend/Dockerfile.
    build:
      context: ./frontend

    # Vite variables are public browser configuration. Never place provider
    # keys or other secrets in a VITE_ variable.
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}

    # Expose Vite on the evaluator's local machine.
    ports:
      - "5173:5173"

    volumes:
      # Mount the frontend project so Vite detects source-code changes.
      - ./frontend:/app

      # Keep container-installed dependencies inside Docker.
      #
      # Without this separate volume, the local frontend mount would hide
      # the node_modules directory installed during the Docker image build.
      - /app/node_modules

    # Start the Vite development server and make it reachable outside
    # the container.
    command:
      - npm
      - run
      - dev
      - --
      - --host
      - 0.0.0.0
